# Production без исходников: только образы из registry.
# На сервере: .env с JWT_SECRET, паролями БД, NUXT_PUBLIC_API_BASE, VITE_API_BASE_URL, CORS_ORIGINS и т.д.
#
# Поднять:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Образы по умолчанию (переопределите при необходимости):
#   BACKEND_IMAGE, FRONTEND_IMAGE, ADMIN_IMAGE

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
      POSTGRES_DB: ${POSTGRES_DB:-news_aggregator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-news_aggregator}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:-tsrg/backend:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-appsecret}@postgres:5432/${POSTGRES_DB:-news_aggregator}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ivanovo.online,https://www.ivanovo.online,https://admin.ivanovo.online}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-news-aggregator}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # Обязательно задайте публичный URL для браузера (не localhost). Пример: https://ivanovo.online/news-aggregator
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    ports:
      - "3002:3000"

  frontend:
    image: ${FRONTEND_IMAGE:-tsrg/frontend:latest}
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:3002}
      NUXT_API_BASE_SERVER: http://backend:3000
    ports:
      - "3001:3000"

  admin:
    image: ${ADMIN_IMAGE:-tsrg/admin:latest}
    restart: unless-stopped
    ports:
      - "5080:80"

volumes:
  postgres_data:
  minio_data:
