# Nginx для ivanovo.online
# Разместить на сервере: /etc/nginx/sites-available/ivanovo.online.conf
# Активировать: ln -s /etc/nginx/sites-available/ivanovo.online.conf /etc/nginx/sites-enabled/
# После установки: sudo nginx -t && sudo systemctl reload nginx

# ── Gzip compression ────────────────────────────────────────────────────────
# gzip уже включён в /etc/nginx/nginx.conf (http-блок) — здесь не дублируем.
# Убедись, что там стоит хотя бы:
#   gzip on;
#   gzip_types text/plain text/css application/javascript application/json image/svg+xml;
#   gzip_proxied any;
#   gzip_vary on;

# ── Proxy cache zone for Nuxt static assets ─────────────────────────────────
proxy_cache_path /var/cache/nginx/nuxt_static
    levels=1:2
    keys_zone=nuxt_static:10m
    max_size=100m
    inactive=7d
    use_temp_path=off;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ivanovo.online www.ivanovo.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        default_type "text/plain";
    }

    location / {
        return 301 https://ivanovo.online$request_uri;
    }
}

# ── Основной сайт (HTTPS) ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name ivanovo.online;

    ssl_certificate     /etc/letsencrypt/live/ivanovo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ivanovo.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Let's Encrypt ACME
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        default_type "text/plain";
    }

    # API бэкенда
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Загруженные файлы
    location /uploads/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # MinIO (новостные изображения) — кэш 7 дней
    # ^~ обязателен: без него regex-локация ~* \.png$ перехватывает запросы
    # и отправляет их в Nuxt (3001) вместо MinIO (9000) → 404
    location ^~ /news-aggregator/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        add_header Vary "Accept-Encoding" always;
    }

    # Nuxt static chunks (content-hashed → immutable, 1 год)
    location ^~ /_nuxt/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache nuxt_static;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Статические файлы (favicon, manifest, fonts) — кэш 30 дней
    location ~* \.(ico|svg|png|webmanifest|txt|woff2|woff|css)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
    }

    # Socket.IO (WebSocket + long-polling)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Фронтенд (Nuxt SSR)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Админ-панель HTTP → HTTPS redirect ──────────────────────────────────────
